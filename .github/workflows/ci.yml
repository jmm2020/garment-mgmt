name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: garment_mgmt
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://dev:dev@localhost:5432/garment_mgmt
      TEST_DATABASE_URL: postgres://dev:dev@localhost:5432/garment_mgmt_test
      SESSION_SECRET: ci-test-secret-with-enough-length-1234567
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Create test DB
        run: |
          PGPASSWORD=dev psql -h localhost -U dev -d garment_mgmt -c "CREATE DATABASE garment_mgmt_test;" || true

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Migrate (dev DB)
        run: pnpm migrate

      - name: Migrate (test DB)
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: pnpm --filter @garment-mgmt/db migrate

      - name: Test
        run: pnpm test
