services:
  postgres:
    image: postgres:16-alpine
    container_name: garment-mgmt-pg
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: garment_mgmt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d garment_mgmt"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
